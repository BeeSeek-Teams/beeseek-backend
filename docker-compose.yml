services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beeseek-backend
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3009
      DATABASE_URL: postgresql://${DB_USERNAME:-user}:${DB_PASSWORD:-beeseek_dev}@postgres:5432/${DB_NAME:-beeseek_db}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-user}
      DB_PASSWORD: ${DB_PASSWORD:-beeseek_dev}
      DB_NAME: ${DB_NAME:-beeseek_db}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-365d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      FROM_EMAIL: ${FROM_EMAIL}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      TERMII_API_KEY: ${TERMII_API_KEY}
      TERMII_SENDER_ID: ${TERMII_SENDER_ID}
      TERMII_BASE_URL: ${TERMII_BASE_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      MONNIFY_API_KEY: ${MONNIFY_API_KEY}
      MONNIFY_SECRET_KEY: ${MONNIFY_SECRET_KEY}
      MONNIFY_CONTRACT_CODE: ${MONNIFY_CONTRACT_CODE}
      MONNIFY_SOURCE_ACCOUNT: ${MONNIFY_SOURCE_ACCOUNT}
      MONNIFY_SANDBOX_MODE: ${MONNIFY_SANDBOX_MODE}
      QUEEN_BEE_PASSWORD: ${QUEEN_BEE_PASSWORD}
      API_URL: ${API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3009/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - beeseek

  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    container_name: beeseek-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    environment:
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beeseek_dev}
      POSTGRES_DB: ${DB_NAME:-beeseek_db}
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_NAME:-beeseek_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beeseek

  redis:
    image: redis:7-alpine
    container_name: beeseek-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beeseek

  pgadmin:
  
    image: dpage/pgadmin4:latesta
    container_name: beeseek-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@beeseek.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - beeseek

volumes:
  pgdata:
  redisdata:

networks:
  beeseek:
    driver: bridge

